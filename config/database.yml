default: &default
  adapter: postgresql
  encoding: unicode
  # Connection pool configuration
  pool: <%= ENV.fetch("RAILS_DB_POOL") { 10 } %>
  # Timeout settings
  checkout_timeout: 5
  reaping_frequency: 60
  # Statement timeout for query performance
  variables:
    statement_timeout: 5000

development:
  <<: *default
  database: ledger_dev
  username: <%= ENV.fetch("DB_USERNAME") { "postgres" } %>
  password: <%= ENV.fetch("DB_PASSWORD") { "" } %>
  host: <%= ENV.fetch("DB_HOST") { "localhost" } %>

test:
  <<: *default
  database: ledger_test
  username: <%= ENV.fetch("DB_USERNAME") { "postgres" } %>
  password: <%= ENV.fetch("DB_PASSWORD") { "" } %>
  host: <%= ENV.fetch("DB_HOST") { "localhost" } %>

