name: CI

on:
  workflow_call:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (RuboCop)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: RuboCop
        run: bundle exec rubocop -f github

  security:
    name: Security (Brakeman + Audit)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Brakeman
        run: bundle exec brakeman --quiet --no-pager

      - name: Bundler Audit
        run: bundle exec bundler-audit check --update

  quality:
    name: Code Quality (Flog + Reek)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Flog (Complexity)
        run: bundle exec flog -s app/ | head -30

      - name: Reek (Code Smells)
        run: bundle exec reek app/ || true

  test:
    name: Test (RSpec + Coverage)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ledger_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      RAILS_ENV: test
      DATABASE_URL: postgres://postgres:***@localhost:5432/ledger_test
      RAILS_MASTER_KEY: test_key_for_ci

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install JS dependencies
        run: npm ci

      - name: Prepare database
        run: bundle exec rails db:prepare

      - name: RSpec
        run: bundle exec rspec --format progress

      - name: Coverage Gate
        run: |
          COVERAGE=$(ruby -rjson -e '
            data = JSON.parse(File.read("coverage/.resultset.json"))
            puts data.values.first["coverage"]["line"].round(2)
          ' 2>/dev/null || echo "0")
          echo "Line coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 80" | bc -l) )); then
            echo "::error::Test coverage (${COVERAGE}%) is below 80% threshold"
            exit 1
          fi

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

      - name: Upload test screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-screenshots
          path: tmp/screenshots/
          if-no-files-found: ignore
          retention-days: 7

  assets:
    name: Assets (Precompile + Importmap)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install JS dependencies
        run: npm ci

      - name: Compile Tailwind CSS
        run: chmod +x ./bin/build-css && ./bin/build-css

      - name: Precompile assets
        run: SECRET_KEY_BASE_DUMMY=ci_test bundle exec rails assets:precompile

      - name: Verify importmap (no external CDN)
        run: |
          if grep -E "https://|http://" config/importmap.rb | grep -v "# "; then
            echo "::error::External CDN URLs found in importmap.rb. All dependencies must be vendored."
            exit 1
          fi
          echo "✅ All importmap dependencies are vendored"

  docker:
    name: Docker Build Verify
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v4

      - name: Build (no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            RUBY_VERSION=3.3.10
